solution:
  created-for: CMSIS-Toolbox@2.5.0
  cdefault:

  select-compiler:        # tested with these compilers
    - compiler: GCC
    - compiler: AC6
    - compiler: IAR

  compiler: AC6           # example is shipped without this selection

  packs:
    - pack: ARM::CMSIS@6.0.0
    - pack: ARM::Cortex_DFP

  target-types:
    - device: ARM::ARMCM33
      type: AVH

  build-types:
    - type: Debug
      debug: on
      optimize: none
    - type: Release
      debug: off
      optimize: balanced

  projects:
    - project: ./CM33_s/CM33_s.cproject.yml
    - project: ./CM33_ns/CM33_ns.cproject.yml
